<!DOCTYPE html><html lang="ro" data-theme="dark"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Fotbal Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<main class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <svg width="52" height="52" viewBox="0 0 32 32" fill="none" aria-label="Fotbal Manager">
        <circle cx="16" cy="16" r="15" stroke="currentColor" stroke-width="2"></circle>
        <path d="M16 4 L20 12 L28 12 L22 18 L24 26 L16 21 L8 26 L10 18 L4 12 L12 12 Z" fill="currentColor" opacity="0.3" stroke="currentColor" stroke-width="1.5"></path>
      </svg>
      <h1>Fotbal Manager</h1>
      <p>Autentificare administrator</p>
    </div>
        <form method="POST" class="form-stack">
      <div class="form-group">
        <label class="form-label" for="username">Utilizator</label>
        <input type="text" id="username" name="username" class="form-control" placeholder="admin" required="" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Parolă</label>
        <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required="" autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary w-full mt-4">Conectare</button>
    </form>
  </div>
</main>
<script src="js/app.js"></script>


</body></html>
